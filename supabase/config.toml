# Supabase project configuration
# https://supabase.com/docs/guides/local-development/cli/config

project_id = "deniz-linkedin-hub"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[storage.buckets.audio]
public = false
file_size_limit = "25MiB"
allowed_mime_types = ["audio/webm", "audio/mpeg", "audio/mp4", "audio/wav", "audio/ogg"]

[storage.buckets.attachments]
public = false
file_size_limit = "10MiB"
allowed_mime_types = ["image/png", "image/jpeg", "image/webp", "application/pdf"]

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000/auth/callback"]
jwt_expiry = 3600
enable_signup = true
enable_anonymous_sign_ins = false

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

# Passwordless magic link (primary auth method for MVP)
[auth.email.template.magic_link]
subject = "Log in to Deniz LinkedIn Hub"
content_path = "./supabase/templates/magic_link.html"
